name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        # Ubuntu 22.04 has the libstdc++ that EWAH's template tags compile
        # against cleanly; 24.04 verifies forward-compat.
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    env:
      DR_VERSION: "10.0.0"
      DR_TARBALL: "DynamoRIO-Linux-10.0.0.tar.gz"
      DR_URL: "https://github.com/DynamoRIO/dynamorio/releases/download/release_10.0.0/DynamoRIO-Linux-10.0.0.tar.gz"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++

      - name: Cache DynamoRIO
        id: cache-dr
        uses: actions/cache@v4
        with:
          path: ~/dynamorio-${{ env.DR_VERSION }}
          key: dynamorio-${{ env.DR_VERSION }}-${{ matrix.os }}

      - name: Install DynamoRIO ${{ env.DR_VERSION }}
        if: steps.cache-dr.outputs.cache-hit != 'true'
        run: |
          cd ~
          curl -fLO "${{ env.DR_URL }}"
          tar xzf "${{ env.DR_TARBALL }}"
          mv "DynamoRIO-Linux-${{ env.DR_VERSION }}" "dynamorio-${{ env.DR_VERSION }}"

      - name: Verify DR
        run: |
          ~/dynamorio-${{ env.DR_VERSION }}/bin64/drrun -version

      - name: Configure
        run: |
          cmake -B build -S . \
            -DDynamoRIO_DIR=$HOME/dynamorio-${{ env.DR_VERSION }}/cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (all 4 reference clients + lib)
        run: cmake --build build -j$(nproc)

      - name: Inventory build artifacts
        run: |
          echo "=== shared libs ==="
          find build -name "*.so" -type f -exec ls -la {} \;
          echo "=== static lib ==="
          find build -name "*.a"  -type f -exec ls -la {} \;

      - name: Smoke test (synthetic_unit + vuzzer_cmp_sink tag-set check)
        env:
          DR_ROOT: /home/runner/dynamorio-10.0.0
        run: ./tests/run_smoke.sh
