name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        # 22.04 = glibc 2.35; 24.04 = glibc 2.39. DR 10.0 SIGFPEs at startup
        # under glibc 2.39; DR 11.x is the fix. We pin DR 11.3.0 (Jan 2025
        # stable, current latest tagged release).
        os: [ubuntu-22.04, ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    env:
      DR_VERSION: "11.3.0"
      DR_RELEASE_TAG: "release_11.3.0-1"
      DR_TARBALL: "DynamoRIO-Linux-11.3.0.tar.gz"
      DR_URL: "https://github.com/DynamoRIO/dynamorio/releases/download/release_11.3.0-1/DynamoRIO-Linux-11.3.0.tar.gz"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++

      - name: Cache DynamoRIO
        id: cache-dr
        uses: actions/cache@v5
        with:
          path: ~/dynamorio-${{ env.DR_VERSION }}
          key: dynamorio-${{ env.DR_VERSION }}-${{ matrix.os }}

      - name: Install DynamoRIO ${{ env.DR_VERSION }}
        if: steps.cache-dr.outputs.cache-hit != 'true'
        run: |
          cd ~
          curl -fLO "${{ env.DR_URL }}"
          tar xzf "${{ env.DR_TARBALL }}"
          # Tarball extracts to "DynamoRIO-Linux-<version>" or
          # "DynamoRIO-Linux-<version>-<build>" depending on the release;
          # match the actual extracted dir via shell glob.
          mv DynamoRIO-Linux-${{ env.DR_VERSION }}* "dynamorio-${{ env.DR_VERSION }}"

      - name: Verify DR
        run: |
          ~/dynamorio-${{ env.DR_VERSION }}/bin64/drrun -version

      - name: Configure
        run: |
          cmake -B build -S . \
            -DDynamoRIO_DIR=$HOME/dynamorio-${{ env.DR_VERSION }}/cmake \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build (all 4 reference clients + lib)
        run: cmake --build build -j$(nproc)

      - name: Inventory build artifacts
        run: |
          echo "=== shared libs ==="
          find build -name "*.so" -type f -exec ls -la {} \;
          echo "=== static lib ==="
          find build -name "*.a"  -type f -exec ls -la {} \;

      - name: Smoke test (synthetic_unit + vuzzer_cmp_sink tag-set check)
        env:
          DR_ROOT: /home/runner/dynamorio-11.3.0
        run: ./tests/run_smoke.sh
